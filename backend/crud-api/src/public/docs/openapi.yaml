openapi: 3.0.0
info:
  title: CRUD API
  version: 1.0.0
  description: API de exemplo com operações CRUD
servers:
  - url: /api
paths:
  /items:
    get:
      summary: Lista todos os itens
      responses:
        '200':
          description: Lista de itens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
    post:
      summary: Cria um novo item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemInput'
      responses:
        '201':
          description: Item criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'

  /items/{id}:
    get:
      summary: Busca item por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Item encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '404':
          description: Item não encontrado
    put:
      summary: Atualiza item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemInput'
      responses:
        '200':
          description: Item atualizado
        '404':
          description: Item não encontrado
    delete:
      summary: Remove item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Item removido
        '404':
          description: Item não encontrado

components:
  schemas:
    Item:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    ItemInput:
      type: object
      properties:
        name:
          type: string
      required:
        - name